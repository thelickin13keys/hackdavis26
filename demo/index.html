<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SafeBike Davis — Demo</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
<style>
  :root {
    --bg: #0e1217;
    --panel: #161c25;
    --panel-2: #1d2531;
    --border: #2a3344;
    --text: #e7ecf2;
    --muted: #8a96a8;
    --accent: #4a8cf7;
    --safe: #2ecc71;
    --fast: #ef5350;
    --warn: #f1c40f;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif; }
  #app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
  header {
    display: flex; align-items: center; gap: 16px; padding: 0 16px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: 0.2px; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header .controls { display: flex; gap: 8px; align-items: center; }
  header input, header select, header button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-size: 12px;
  }
  header button.primary {
    background: var(--accent); border-color: var(--accent); color: white;
    font-weight: 600; padding: 6px 14px; cursor: pointer;
  }
  header button.primary:disabled { opacity: 0.45; cursor: wait; }
  header button.secondary { cursor: pointer; }

  main { display: grid; grid-template-columns: 1fr 380px; min-height: 0; }
  #map { width: 100%; height: 100%; }
  aside { background: var(--panel); border-left: 1px solid var(--border);
    display: grid; grid-template-rows: auto 1fr auto; min-height: 0; }

  .compare { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .compare h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 8px; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pair .card { background: var(--panel-2); border-radius: 6px; padding: 10px;
    border-left: 3px solid var(--border); }
  .pair .card.safe { border-left-color: var(--safe); }
  .pair .card.fast { border-left-color: var(--fast); }
  .pair .card .label { font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; }
  .pair .card .value { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .pair .card .stat { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .alerts { padding: 10px 14px; overflow-y: auto; min-height: 0; }
  .alerts h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 8px; }
  .alerts .empty { color: var(--muted); font-size: 12px; }
  .alert {
    display: flex; gap: 10px; padding: 10px; border-radius: 6px;
    background: var(--panel-2); border-left: 3px solid var(--warn);
    margin-bottom: 8px; animation: slideIn 0.3s ease-out;
  }
  .alert.danger { border-left-color: var(--danger); }
  .alert .icon { font-size: 18px; line-height: 1; }
  .alert .title { font-size: 13px; font-weight: 600; }
  .alert .summary { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .streetview {
    border-top: 1px solid var(--border); padding: 10px 14px; background: var(--panel-2);
  }
  .streetview h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 8px; }
  .sv-frame {
    position: relative; width: 100%; aspect-ratio: 1; background: #000;
    border-radius: 4px; overflow: hidden;
  }
  .sv-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .sv-frame .overlay { position: absolute; inset: 0; pointer-events: none; }
  .sv-frame .empty {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px;
  }
  .sv-meta { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .hazard-tag {
    display: inline-block; background: rgba(255,107,107,0.15); color: #ff9a9a;
    padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 4px; margin-top: 2px;
  }

  .legend {
    position: absolute; bottom: 12px; left: 12px; background: rgba(20, 25, 35, 0.92);
    padding: 8px 12px; border-radius: 6px; font-size: 11px; color: var(--text);
    border: 1px solid var(--border); display: flex; gap: 14px;
  }
  .legend .row { display: flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 14px; height: 4px; border-radius: 2px; }

  .toast-stack {
    position: absolute; top: 70px; right: 396px; display: flex; flex-direction: column;
    gap: 8px; z-index: 5; max-width: 320px; pointer-events: none;
  }
  .toast {
    background: var(--panel); color: var(--text); padding: 10px 14px;
    border-radius: 6px; box-shadow: 0 6px 24px rgba(0,0,0,0.4); border-left: 3px solid var(--warn);
    animation: slideRight 0.35s ease-out;
  }
  .toast.danger { border-left-color: var(--danger); }
  .toast .title { font-size: 13px; font-weight: 600; }
  .toast .summary { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .status-bar {
    position: absolute; top: 70px; left: 12px; background: rgba(20, 25, 35, 0.92);
    padding: 8px 12px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .status-bar .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }
  .status-bar .dot.idle { background: var(--muted); }
  .status-bar .dot.alive { background: var(--safe); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

  .bbox-rect { position: absolute; border: 2px solid var(--danger); border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4); }
  .bbox-rect .lbl {
    position: absolute; top: -18px; left: 0; background: var(--danger); color: white;
    font-size: 10px; padding: 1px 5px; border-radius: 2px; white-space: nowrap;
  }
  .bbox-point { position: absolute; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--danger); transform: translate(-50%, -50%);
    box-shadow: 0 0 0 2px rgba(255,107,107,0.3); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>SafeBike Davis</h1>
    <span class="sub">Live agent walk</span>
    <div class="spacer"></div>
    <div class="controls">
      <select id="presets">
        <option value="8th-olive" selected>8th & F → 965 Olive Dr</option>
        <option value="mu-coop">UC Davis MU → Davis Co-op</option>
        <option value="silo-arboretum">Silo → Arboretum loop</option>
        <option value="north-south">North Davis → Downtown</option>
        <option value="custom">Custom (click two map points)</option>
      </select>
      <select id="weight">
        <option value="cost_safe" selected>Safest</option>
        <option value="cost_fast">Fastest</option>
      </select>
      <select id="speed">
        <option value="2.5">0.5x</option>
        <option value="5" selected>1x</option>
        <option value="20">4x</option>
        <option value="40">8x</option>
      </select>
      <button id="reset" class="secondary">Reset</button>
      <button id="start" class="primary">Start tour</button>
    </div>
  </header>

  <main>
    <div style="position: relative; min-height: 0;">
      <div id="map"></div>
      <div class="status-bar">
        <span id="dot" class="dot idle"></span>
        <span id="status">Idle. Pick a route and press Start tour.</span>
      </div>
      <div class="toast-stack" id="toasts"></div>
      <div class="legend">
        <div class="row"><div class="swatch" style="background: var(--safe)"></div>Safe</div>
        <div class="row"><div class="swatch" style="background: var(--warn)"></div>Mixed</div>
        <div class="row"><div class="swatch" style="background: var(--fast)"></div>Risky</div>
        <div class="row"><div class="swatch" style="background: #888"></div>Unscored</div>
      </div>
    </div>

    <aside>
      <div class="compare">
        <h2>Route comparison</h2>
        <div class="pair">
          <div class="card safe">
            <div class="label">Safest</div>
            <div class="value" id="safe-len">— km</div>
            <div class="stat" id="safe-score">avg safety —</div>
          </div>
          <div class="card fast">
            <div class="label">Fastest</div>
            <div class="value" id="fast-len">— km</div>
            <div class="stat" id="fast-score">avg safety —</div>
          </div>
        </div>
      </div>

      <div class="alerts">
        <h2>Alerts</h2>
        <div id="alert-list" class="empty">No alerts yet — press Start tour.</div>
      </div>

      <div class="streetview">
        <h2>Street View — what the agent sees</h2>
        <div class="sv-frame" id="sv-frame">
          <div class="empty">Waiting for sample…</div>
        </div>
        <div class="sv-meta" id="sv-meta"></div>
      </div>
    </aside>
  </main>
</div>

<script>
// ---------- Config ---------------------------------------------------------

const API = ""; // same origin (served from FastAPI). Override with ?api=http://...
const apiOverride = new URLSearchParams(location.search).get("api");
const apiBase = apiOverride || API;

// Mapbox token. Pass via ?token=pk.… or set window.MAPBOX_TOKEN before this script.
const tokenFromQuery = new URLSearchParams(location.search).get("token");
mapboxgl.accessToken = tokenFromQuery || window.MAPBOX_TOKEN || "";

if (!mapboxgl.accessToken) {
  document.getElementById("status").textContent =
    "Missing Mapbox token. Append ?token=pk.your_token to the URL.";
}

// Davis-area presets. Adjust if your scored data covers a different area.
const PRESETS = {
  // Matches the default route in web/ (mock-data.ts ORIGIN/DESTINATION).
  "8th-olive":       { from: [-121.7400, 38.5495], to: [-121.73996, 38.540026] },
  "mu-coop":         { from: [-121.7494, 38.5421], to: [-121.7421, 38.5485] },
  "silo-arboretum":  { from: [-121.7530, 38.5400], to: [-121.7560, 38.5360] },
  "north-south":     { from: [-121.7400, 38.5650], to: [-121.7390, 38.5440] },
};

// ---------- Map setup ------------------------------------------------------

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/dark-v11",
  center: [-121.7405, 38.5449],
  zoom: 13.2,
});

let scoresFC = null;
let activeStream = null;
let cyclist = null;
let customPoints = [];

map.on("load", async () => {
  // Background layer: scored edges, color by safety.
  try {
    const r = await fetch(`${apiBase}/scores`);
    scoresFC = await r.json();
  } catch (e) {
    console.warn("scores load failed", e);
    scoresFC = { type: "FeatureCollection", features: [] };
  }
  map.addSource("scores", { type: "geojson", data: scoresFC });
  map.addLayer({
    id: "scores",
    type: "line",
    source: "scores",
    paint: {
      "line-width": ["interpolate", ["linear"], ["zoom"], 12, 1, 16, 3],
      "line-color": [
        "case",
        ["==", ["get", "score"], null], "#666",
        ["interpolate", ["linear"], ["get", "score"],
          1, "#ef5350", 5, "#f1c40f", 10, "#2ecc71"],
      ],
      "line-opacity": 0.55,
    },
  });

  // Two route layers + the cyclist marker.
  for (const id of ["route-fast", "route-safe", "route-progress"]) {
    map.addSource(id, { type: "geojson", data: emptyFC() });
  }
  map.addLayer({
    id: "route-fast", type: "line", source: "route-fast",
    paint: { "line-color": "#ef5350", "line-width": 4, "line-opacity": 0.55, "line-dasharray": [2, 1.5] },
  });
  map.addLayer({
    id: "route-safe", type: "line", source: "route-safe",
    paint: { "line-color": "#2ecc71", "line-width": 5, "line-opacity": 0.55 },
  });
  map.addLayer({
    id: "route-progress", type: "line", source: "route-progress",
    paint: { "line-color": "#7be39d", "line-width": 7, "line-opacity": 0.9 },
  });

  map.on("click", onMapClick);
});

function emptyFC() { return { type: "FeatureCollection", features: [] }; }

function setSourceLine(id, lineString) {
  const feature = lineString
    ? { type: "Feature", geometry: lineString, properties: {} }
    : null;
  const data = feature ? { type: "FeatureCollection", features: [feature] } : emptyFC();
  const src = map.getSource(id);
  if (src) src.setData(data);
}

function setMarker(lngLat) {
  if (!cyclist) {
    const el = document.createElement("div");
    el.style.cssText = `width:18px;height:18px;border-radius:50%;background:#fff;
      box-shadow:0 0 0 4px rgba(74,140,247,0.5),0 2px 6px rgba(0,0,0,0.6);
      border:2px solid #4a8cf7;`;
    cyclist = new mapboxgl.Marker({ element: el }).setLngLat(lngLat).addTo(map);
  } else {
    cyclist.setLngLat(lngLat);
  }
}

function fitBoundsToCoords(coords) {
  if (!coords || !coords.length) return;
  const b = new mapboxgl.LngLatBounds(coords[0], coords[0]);
  for (const c of coords) b.extend(c);
  map.fitBounds(b, { padding: 80, duration: 700 });
}

// ---------- Custom point picking ------------------------------------------

const customMarkers = [];
function onMapClick(e) {
  if (document.getElementById("presets").value !== "custom") return;
  if (customPoints.length >= 2) {
    customPoints = [];
    customMarkers.forEach(m => m.remove());
    customMarkers.length = 0;
  }
  const p = [e.lngLat.lng, e.lngLat.lat];
  customPoints.push(p);
  const m = new mapboxgl.Marker({ color: customPoints.length === 1 ? "#4a8cf7" : "#ef5350" })
    .setLngLat(p).addTo(map);
  customMarkers.push(m);
}

// ---------- Route fetch (for the comparison panel) ------------------------

async function fetchBothRoutes(from, to) {
  const res = await fetch(`${apiBase}/route`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      start_lat: from[1], start_lon: from[0], end_lat: to[1], end_lon: to[0],
    }),
  });
  if (!res.ok) throw new Error(`route ${res.status}`);
  return res.json();
}

function fmtKm(m) { return (m / 1000).toFixed(2) + " km"; }
function fmtScore(s) { return s == null ? "—" : s.toFixed(1) + " / 10"; }

function paintComparison(both) {
  document.getElementById("safe-len").textContent = fmtKm(both.safe.summary.length_m);
  document.getElementById("safe-score").textContent =
    "avg safety " + fmtScore(both.safe.summary.weighted_safety_score);
  document.getElementById("fast-len").textContent = fmtKm(both.fast.summary.length_m);
  document.getElementById("fast-score").textContent =
    "avg safety " + fmtScore(both.fast.summary.weighted_safety_score);

  setSourceLine("route-fast", routeToLine(both.fast));
  setSourceLine("route-safe", routeToLine(both.safe));
  setSourceLine("route-progress", null);

  const allCoords = [...routeToLine(both.fast).coordinates, ...routeToLine(both.safe).coordinates];
  fitBoundsToCoords(allCoords);
}

function routeToLine(r) {
  const coords = [];
  for (const e of r.edges) {
    for (const c of e.geometry.coordinates) {
      const last = coords[coords.length - 1];
      if (!last || last[0] !== c[0] || last[1] !== c[1]) coords.push(c);
    }
  }
  return { type: "LineString", coordinates: coords };
}

// ---------- SSE walk -------------------------------------------------------

function setStatus(text, mode = "alive") {
  document.getElementById("status").textContent = text;
  const dot = document.getElementById("dot");
  dot.classList.remove("idle", "alive");
  dot.classList.add(mode);
}

function clearAlerts() {
  const el = document.getElementById("alert-list");
  el.classList.add("empty");
  el.textContent = "No alerts yet — agent has clear sailing.";
  document.getElementById("toasts").innerHTML = "";
}

function pushAlert(a) {
  const list = document.getElementById("alert-list");
  if (list.classList.contains("empty")) {
    list.classList.remove("empty");
    list.innerHTML = "";
  }
  const div = document.createElement("div");
  div.className = "alert" + (a.level === "danger" ? " danger" : "");
  div.innerHTML = `
    <div class="icon">${a.kind === "scary_intersection" ? "▲" : "●"}</div>
    <div>
      <div class="title">${escapeHTML(a.title)}</div>
      <div class="summary">${escapeHTML(a.summary || "")}</div>
    </div>`;
  list.prepend(div);

  // Toast above the map
  const toast = document.createElement("div");
  toast.className = "toast" + (a.level === "danger" ? " danger" : "");
  toast.innerHTML = `
    <div class="title">${escapeHTML(a.title)}</div>
    <div class="summary">${escapeHTML(a.summary || "")}</div>`;
  const stack = document.getElementById("toasts");
  stack.appendChild(toast);
  setTimeout(() => toast.style.opacity = "0", 4500);
  setTimeout(() => toast.remove(), 5200);
}

function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
  }[c]));
}

// Animate cyclist along a polyline over duration_ms.
let animationFrame = null;
function animateAlongLine(coords, durationMs, onDone) {
  if (animationFrame) cancelAnimationFrame(animationFrame);
  if (!coords || coords.length < 2) { onDone && onDone(); return; }
  // cumulative length in degrees
  const dists = [0];
  for (let i = 1; i < coords.length; i++) {
    const dx = coords[i][0] - coords[i - 1][0];
    const dy = coords[i][1] - coords[i - 1][1];
    dists.push(dists[i - 1] + Math.sqrt(dx * dx + dy * dy));
  }
  const total = dists[dists.length - 1] || 1e-9;
  const t0 = performance.now();
  function step(now) {
    const t = Math.min(1, (now - t0) / Math.max(durationMs, 1));
    const target = t * total;
    let i = 1;
    while (i < dists.length && dists[i] < target) i++;
    const i0 = Math.max(0, i - 1);
    const segLen = dists[i] - dists[i0] || 1e-9;
    const f = (target - dists[i0]) / segLen;
    const lng = coords[i0][0] + (coords[i][0] - coords[i0][0]) * f;
    const lat = coords[i0][1] + (coords[i][1] - coords[i0][1]) * f;
    setMarker([lng, lat]);
    if (t < 1) animationFrame = requestAnimationFrame(step);
    else onDone && onDone();
  }
  animationFrame = requestAnimationFrame(step);
}

// Track progressed coords so we can paint the cyclist's wake.
let progressed = [];
function appendProgress(coords) {
  for (const c of coords) {
    const last = progressed[progressed.length - 1];
    if (!last || last[0] !== c[0] || last[1] !== c[1]) progressed.push(c);
  }
  setSourceLine("route-progress", { type: "LineString", coordinates: progressed });
}

// ---------- Street View panel ---------------------------------------------

function showStreetView(sample) {
  const frame = document.getElementById("sv-frame");
  const meta = document.getElementById("sv-meta");
  if (!sample || !sample.images || !sample.images.length) {
    frame.innerHTML = `<div class="empty">No imagery for this segment.</div>`;
    meta.innerHTML = "";
    return;
  }
  // Show first image (forward view); overlay any hazards whose image_index === 0.
  const img = sample.images[0];
  const url = `${apiBase}/image?path=${encodeURIComponent(img.image_path)}`;
  frame.innerHTML = `
    <img id="sv-img" src="${url}" alt="Street View" />
    <div class="overlay" id="sv-overlay"></div>`;
  const imgEl = frame.querySelector("img");
  imgEl.onload = () => paintBoxes(sample, 0);
  // also handle if cached
  if (imgEl.complete) paintBoxes(sample, 0);

  const score = sample.score == null ? "—" : sample.score + "/10";
  const infra = sample.infrastructure || "unknown";
  const reasons = (sample.reasons || []).join(" · ");
  const hazardTags = (sample.hazards || []).slice(0, 4)
    .map(h => `<span class="hazard-tag">${escapeHTML(h.type)}${h.severity ? ` ·${h.severity}` : ""}</span>`).join("");
  meta.innerHTML = `
    <div><strong>Safety ${score}</strong> · ${escapeHTML(infra)}</div>
    <div style="margin-top:4px;">${hazardTags}</div>
    ${reasons ? `<div style="margin-top:4px;">${escapeHTML(reasons)}</div>` : ""}`;
}

function paintBoxes(sample, imageIndex) {
  const overlay = document.getElementById("sv-overlay");
  const img = document.getElementById("sv-img");
  if (!overlay || !img) return;
  overlay.innerHTML = "";
  const w = img.clientWidth, h = img.clientHeight;
  for (const hz of (sample.hazards || [])) {
    if (hz.image_index !== imageIndex) continue;
    if (hz.bbox && hz.bbox.length === 4) {
      const [ymin, xmin, ymax, xmax] = hz.bbox;
      const left = xmin / 1000 * w;
      const top = ymin / 1000 * h;
      const width = (xmax - xmin) / 1000 * w;
      const height = (ymax - ymin) / 1000 * h;
      const rect = document.createElement("div");
      rect.className = "bbox-rect";
      rect.style.left = left + "px";
      rect.style.top = top + "px";
      rect.style.width = width + "px";
      rect.style.height = height + "px";
      const lbl = document.createElement("div");
      lbl.className = "lbl";
      lbl.textContent = hz.type + (hz.severity ? ` ·${hz.severity}` : "");
      rect.appendChild(lbl);
      overlay.appendChild(rect);
    } else if (hz.point && hz.point.length === 2) {
      const [y, x] = hz.point;
      const dot = document.createElement("div");
      dot.className = "bbox-point";
      dot.style.left = (x / 1000 * w) + "px";
      dot.style.top = (y / 1000 * h) + "px";
      overlay.appendChild(dot);
    }
  }
}

// ---------- Walk orchestrator --------------------------------------------

async function startTour() {
  const presetKey = document.getElementById("presets").value;
  let from, to;
  if (presetKey === "custom") {
    if (customPoints.length < 2) {
      setStatus("Click two points on the map first (custom mode).", "idle");
      return;
    }
    [from, to] = customPoints;
  } else {
    ({ from, to } = PRESETS[presetKey]);
  }

  const speedSel = document.getElementById("speed").value;
  document.getElementById("start").disabled = true;
  setStatus("Computing routes…", "alive");
  clearAlerts();
  progressed = [];
  setSourceLine("route-progress", null);

  let both;
  try {
    both = await fetchBothRoutes(from, to);
    paintComparison(both);
  } catch (e) {
    setStatus("Route lookup failed: " + e.message, "idle");
    document.getElementById("start").disabled = false;
    return;
  }

  setStatus("Agent walking the safest route…", "alive");

  if (activeStream) activeStream.close();

  const weightSel = document.getElementById("weight").value;
  const params = new URLSearchParams({
    start_lat: from[1], start_lon: from[0],
    end_lat: to[1],   end_lon: to[0],
    weight: weightSel,
    time_scale: speedSel,
  });
  const es = new EventSource(`${apiBase}/demo/walk?${params.toString()}`);
  activeStream = es;

  let queue = Promise.resolve();

  es.addEventListener("start", (ev) => {
    const data = JSON.parse(ev.data);
    if (data.geometry && data.geometry.coordinates && data.geometry.coordinates.length) {
      setMarker(data.geometry.coordinates[0]);
    }
  });

  es.addEventListener("alert", (ev) => {
    pushAlert(JSON.parse(ev.data));
  });

  es.addEventListener("step", (ev) => {
    const step = JSON.parse(ev.data);
    // Find the most informative sample (with hazards or with image) for the panel.
    const samples = step.samples || [];
    const showSample = samples.find(s => (s.hazards && s.hazards.length) || (s.images && s.images.length))
                    || samples[0]
                    || null;
    if (showSample) showStreetView(showSample);

    // Animate the cyclist along this edge's geometry over its duration.
    const coords = (step.geometry && step.geometry.coordinates) || [];
    queue = queue.then(() => new Promise(resolve => {
      animateAlongLine(coords, step.duration_ms || 600, () => {
        appendProgress(coords);
        resolve();
      });
    }));
  });

  es.addEventListener("done", (ev) => {
    queue.then(() => {
      const data = JSON.parse(ev.data);
      setStatus(`Arrived. ${fmtKm(data.summary.length_m)} · safety ${fmtScore(data.summary.weighted_safety_score)}`, "idle");
      document.getElementById("start").disabled = false;
      es.close();
      activeStream = null;
    });
  });

  es.onerror = (e) => {
    console.error("SSE error", e);
    setStatus("Stream interrupted.", "idle");
    document.getElementById("start").disabled = false;
    es.close();
    activeStream = null;
  };
}

// ---------- Wire controls -------------------------------------------------

document.getElementById("start").addEventListener("click", startTour);
document.getElementById("reset").addEventListener("click", () => {
  if (activeStream) { activeStream.close(); activeStream = null; }
  if (animationFrame) cancelAnimationFrame(animationFrame);
  progressed = [];
  setSourceLine("route-progress", null);
  setSourceLine("route-fast", null);
  setSourceLine("route-safe", null);
  if (cyclist) { cyclist.remove(); cyclist = null; }
  customMarkers.forEach(m => m.remove());
  customMarkers.length = 0;
  customPoints = [];
  document.getElementById("safe-len").textContent = "— km";
  document.getElementById("safe-score").textContent = "avg safety —";
  document.getElementById("fast-len").textContent = "— km";
  document.getElementById("fast-score").textContent = "avg safety —";
  document.getElementById("sv-frame").innerHTML = `<div class="empty">Waiting for sample…</div>`;
  document.getElementById("sv-meta").innerHTML = "";
  clearAlerts();
  document.getElementById("alert-list").classList.add("empty");
  document.getElementById("alert-list").textContent = "No alerts yet — press Start tour.";
  setStatus("Idle. Pick a route and press Start tour.", "idle");
  document.getElementById("start").disabled = false;
});
</script>
</body>
