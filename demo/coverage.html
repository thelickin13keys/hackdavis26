<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aggie Street Smarts — Coverage</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
<style>
  :root {
    --bg: #0e1217;
    --panel: #161c25;
    --panel-2: #1d2531;
    --border: #2a3344;
    --text: #e7ecf2;
    --muted: #8a96a8;
    --accent: #4a8cf7;
    --measured: #2ecc71;
    --inferred: #4a8cf7;
    --unscored: #777;
    --warn: #f1c40f;
    --danger: #ef5350;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif; }
  #app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
  header {
    display: flex; align-items: center; gap: 12px; padding: 0 16px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header label { font-size: 12px; color: var(--muted); }
  header input, header button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-size: 12px;
  }
  header input { width: 220px; font-family: ui-monospace, monospace; }
  header button { cursor: pointer; }
  header button.primary { background: var(--accent); border-color: var(--accent); }
  header .toggle { display: flex; align-items: center; gap: 6px; }

  #map { width: 100%; height: 100%; }

  .panel {
    position: absolute; background: rgba(20, 25, 35, 0.94);
    padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
    backdrop-filter: blur(6px);
  }
  .stats { top: 70px; right: 12px; min-width: 240px; }
  .stats h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 8px; }
  .stats .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0; font-size: 13px;
  }
  .stats .row .lbl { color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .stats .row .val { font-weight: 600; }
  .stats .swatch { width: 14px; height: 4px; border-radius: 2px; }
  .stats .bar {
    height: 6px; background: var(--panel-2); border-radius: 3px;
    overflow: hidden; display: flex; margin-top: 8px;
  }
  .stats .bar > span { display: block; height: 100%; }
  .stats .footnote { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.4; }

  .legend { bottom: 12px; left: 12px; font-size: 12px; }
  .legend h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin: 0 0 8px; }
  .legend .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .legend .swatch { width: 18px; height: 4px; border-radius: 2px; }
  .legend .swatch.dashed { background: linear-gradient(90deg, var(--inferred) 60%, transparent 60%);
    background-size: 8px 100%; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }

  .status-bar {
    position: absolute; bottom: 12px; right: 12px; background: rgba(20, 25, 35, 0.94);
    padding: 6px 10px; border-radius: 6px; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border);
  }

  /* checkbox */
  input[type="checkbox"] { accent-color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Aggie Street Smarts</h1>
    <span class="sub">Coverage map</span>
    <div class="spacer"></div>
    <label>bbox</label>
    <input id="bbox" placeholder="south,west,north,east" />
    <label class="toggle"><input type="checkbox" id="auto" /> auto-refresh</label>
    <button id="refresh" class="primary">Refresh</button>
    <button id="open-demo" title="Open the demo tour">Demo →</button>
  </header>

  <div style="position: relative;">
    <div id="map"></div>

    <div class="panel stats">
      <h2>Coverage</h2>
      <div id="stats-rows"></div>
      <div class="bar" id="stats-bar"></div>
      <div class="footnote" id="stats-footnote">Loading…</div>
    </div>

    <div class="panel legend">
      <h2>Legend</h2>
      <div class="row"><div class="swatch" style="background: linear-gradient(90deg,#ef5350,#f1c40f,#2ecc71);"></div>Measured (Gemini score)</div>
      <div class="row"><div class="swatch dashed"></div>Inferred (OSM tag → cycleway/path)</div>
      <div class="row"><div class="swatch" style="background: var(--unscored);"></div>Unscored</div>
      <div class="row"><div class="dot" style="background: var(--measured);"></div>Scored intersection</div>
      <div class="row"><div class="dot" style="background: #555; border:1px dashed #888;"></div>Unscored intersection</div>
      <div class="row"><div class="swatch" style="background: var(--accent); opacity:0.5;"></div>Active bbox</div>
    </div>

    <div class="status-bar" id="status">Loading map…</div>
  </div>
</div>

<script>
// ---------- config ---------------------------------------------------------

const apiOverride = new URLSearchParams(location.search).get("api");
const apiBase = apiOverride || "";
const tokenFromQuery = new URLSearchParams(location.search).get("token");
mapboxgl.accessToken = tokenFromQuery || window.MAPBOX_TOKEN || "";

// Default to the demo bbox unless overridden by ?bbox=… or the input field.
const initialBbox =
  new URLSearchParams(location.search).get("bbox")
  || "38.535,-121.760,38.555,-121.735";

// ---------- map ------------------------------------------------------------

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/dark-v11",
  center: [-121.7405, 38.5449],
  zoom: 12.5,
});

map.on("load", () => {
  // Bbox overlay
  map.addSource("bbox", { type: "geojson", data: emptyFC() });
  map.addLayer({
    id: "bbox-fill", type: "fill", source: "bbox",
    paint: { "fill-color": "#4a8cf7", "fill-opacity": 0.08 },
  });
  map.addLayer({
    id: "bbox-line", type: "line", source: "bbox",
    paint: { "line-color": "#4a8cf7", "line-opacity": 0.7, "line-width": 1.5, "line-dasharray": [3, 2] },
  });

  // Edges. Three layers stacked so styling rules stay simple.
  map.addSource("edges", { type: "geojson", data: emptyFC() });
  map.addLayer({
    id: "edges-unscored", type: "line", source: "edges",
    filter: ["==", ["get", "status"], "unscored"],
    paint: { "line-color": "#777", "line-opacity": 0.35,
             "line-width": ["interpolate", ["linear"], ["zoom"], 11, 0.6, 16, 2] },
  });
  map.addLayer({
    id: "edges-inferred", type: "line", source: "edges",
    filter: ["==", ["get", "status"], "inferred"],
    paint: {
      "line-color": "#4a8cf7", "line-opacity": 0.65,
      "line-width": ["interpolate", ["linear"], ["zoom"], 11, 1, 16, 3],
      "line-dasharray": [2, 1.2],
    },
  });
  map.addLayer({
    id: "edges-measured", type: "line", source: "edges",
    filter: ["==", ["get", "status"], "measured"],
    paint: {
      "line-color": [
        "interpolate", ["linear"], ["coalesce", ["get", "score"], 5],
        1, "#ef5350", 5, "#f1c40f", 10, "#2ecc71",
      ],
      "line-opacity": 0.9,
      "line-width": ["interpolate", ["linear"], ["zoom"], 11, 1.5, 16, 4],
    },
  });

  // Intersections.
  map.addSource("isects", { type: "geojson", data: emptyFC() });
  map.addLayer({
    id: "isects-unscored", type: "circle", source: "isects",
    filter: ["!", ["has", "score"]],
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 12, 1.5, 16, 3.5],
      "circle-color": "#444",
      "circle-stroke-color": "#888",
      "circle-stroke-width": 1,
    },
  });
  map.addLayer({
    id: "isects-scored", type: "circle", source: "isects",
    filter: ["all", ["has", "score"], ["!=", ["get", "score"], null]],
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 12, 3, 16, 7],
      "circle-color": [
        "interpolate", ["linear"], ["coalesce", ["get", "score"], 5],
        1, "#ef5350", 5, "#f1c40f", 10, "#2ecc71",
      ],
      "circle-stroke-color": "#0e1217",
      "circle-stroke-width": 1.2,
    },
  });

  // Hover tooltip
  const popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false, offset: 6 });
  for (const layer of ["edges-measured", "edges-inferred", "edges-unscored"]) {
    map.on("mousemove", layer, (e) => {
      if (!e.features.length) return;
      const f = e.features[0].properties;
      const score = f.score == null ? "—" : Number(f.score).toFixed(1);
      const status = f.status;
      const samples = f.sample_count || 0;
      popup.setLngLat(e.lngLat).setHTML(
        `<div style="font-family:-apple-system,sans-serif;font-size:12px;color:#fff;">
           <div><strong>${escapeHTML(f.name || "(unnamed)")}</strong></div>
           <div style="color:#bbb;">${escapeHTML(f.highway || "")} · ${Math.round(f.length_m||0)}m</div>
           <div style="margin-top:2px;">score <strong>${score}</strong> · ${status}${samples ? ` · ${samples} sample${samples>1?"s":""}` : ""}</div>
         </div>`
      ).addTo(map);
    });
    map.on("mouseleave", layer, () => popup.remove());
  }

  document.getElementById("bbox").value = initialBbox;
  refresh();
});

function emptyFC() { return { type: "FeatureCollection", features: [] }; }

// ---------- data load ------------------------------------------------------

async function fetchJSON(path) {
  const r = await fetch(`${apiBase}${path}`);
  if (!r.ok) throw new Error(`${path}: ${r.status}`);
  return r.json();
}

function classifyEdge(props) {
  if (props.score == null) return "unscored";
  if ((props.sample_count || 0) === 0) return "inferred";
  return "measured";
}

function bboxFC(s) {
  if (!s) return emptyFC();
  const parts = s.split(",").map(x => parseFloat(x.trim()));
  if (parts.length !== 4 || parts.some(Number.isNaN)) return emptyFC();
  const [south, west, north, east] = parts;
  if (south >= north || west >= east) return emptyFC();
  return {
    type: "FeatureCollection",
    features: [{
      type: "Feature",
      geometry: {
        type: "Polygon",
        coordinates: [[
          [west, south], [east, south], [east, north], [west, north], [west, south]
        ]],
      },
      properties: { south, west, north, east },
    }],
  };
}

let lastEdges = null;
let firstLoad = true;

async function refresh() {
  setStatus("Loading…");
  try {
    const [edges, isects] = await Promise.all([
      fetchJSON("/scores"),
      fetchJSON("/intersections").catch(() => emptyFC()),  // tolerate older builds
    ]);
    // Tag each feature with a status so the layer filters work.
    for (const f of edges.features) {
      f.properties.status = classifyEdge(f.properties);
    }

    const bboxStr = document.getElementById("bbox").value.trim();
    map.getSource("edges").setData(edges);
    map.getSource("isects").setData(isects);
    map.getSource("bbox").setData(bboxFC(bboxStr));

    paintStats(edges, isects, bboxStr);
    lastEdges = edges;

    if (firstLoad) {
      firstLoad = false;
      const fc = bboxFC(bboxStr);
      if (fc.features.length) {
        const f = fc.features[0].properties;
        map.fitBounds([[f.west, f.south], [f.east, f.north]], { padding: 60, duration: 600 });
      }
    }

    setStatus(`Updated ${new Date().toLocaleTimeString()}`);
  } catch (e) {
    console.error(e);
    setStatus("Refresh failed: " + e.message);
  }
}

function paintStats(edges, isects, bboxStr) {
  let totalLen = 0, measuredLen = 0, inferredLen = 0, unscoredLen = 0;
  let totalEdges = 0, measuredEdges = 0, inferredEdges = 0, unscoredEdges = 0;
  let inBbox = 0, inBboxScored = 0;
  const bboxParts = parseBbox(bboxStr);

  for (const f of edges.features) {
    const len = f.properties.length_m || 0;
    totalLen += len;
    totalEdges += 1;
    const status = f.properties.status;
    if (status === "measured") { measuredLen += len; measuredEdges += 1; }
    else if (status === "inferred") { inferredLen += len; inferredEdges += 1; }
    else { unscoredLen += len; unscoredEdges += 1; }

    if (bboxParts) {
      const c = f.geometry.coordinates;
      if (c && c.length) {
        const mid = c[Math.floor(c.length / 2)];
        if (insideBbox(mid[1], mid[0], bboxParts)) {
          inBbox += 1;
          if (status !== "unscored") inBboxScored += 1;
        }
      }
    }
  }

  const isectsTotal = isects.features.length;
  const isectsScored = isects.features.filter(f => f.properties && f.properties.score != null).length;

  const rows = document.getElementById("stats-rows");
  rows.innerHTML = `
    ${row("var(--measured)", "Measured", `${measuredEdges.toLocaleString()} edges · ${(measuredLen/1000).toFixed(1)} km`)}
    ${row("var(--inferred)", "Inferred", `${inferredEdges.toLocaleString()} edges · ${(inferredLen/1000).toFixed(1)} km`)}
    ${row("var(--unscored)", "Unscored", `${unscoredEdges.toLocaleString()} edges · ${(unscoredLen/1000).toFixed(1)} km`)}
    ${row("transparent", "Total", `${totalEdges.toLocaleString()} edges · ${(totalLen/1000).toFixed(1)} km`)}
    ${row("var(--measured)", "Intersections", `${isectsScored.toLocaleString()} / ${isectsTotal.toLocaleString()} scored`)}
  `;

  const bar = document.getElementById("stats-bar");
  const tot = totalLen || 1;
  bar.innerHTML = `
    <span style="background: var(--measured); width: ${(measuredLen/tot)*100}%"></span>
    <span style="background: var(--inferred); width: ${(inferredLen/tot)*100}%"></span>
    <span style="background: var(--unscored); width: ${(unscoredLen/tot)*100}%"></span>
  `;

  const note = document.getElementById("stats-footnote");
  if (bboxParts) {
    note.innerHTML = `In active bbox: <strong>${inBboxScored.toLocaleString()}</strong>/${inBbox.toLocaleString()} edges scored (${inBbox ? Math.round(100*inBboxScored/inBbox) : 0}%)`;
  } else {
    note.textContent = "No bbox set; showing global coverage.";
  }
}

function row(swatchColor, label, val) {
  return `<div class="row">
    <div class="lbl"><div class="swatch" style="background:${swatchColor}"></div>${escapeHTML(label)}</div>
    <div class="val">${val}</div>
  </div>`;
}

function escapeHTML(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
  }[c]));
}

function parseBbox(s) {
  if (!s) return null;
  const p = s.split(",").map(x => parseFloat(x.trim()));
  if (p.length !== 4 || p.some(Number.isNaN)) return null;
  return { south: p[0], west: p[1], north: p[2], east: p[3] };
}
function insideBbox(lat, lon, b) {
  return lat >= b.south && lat <= b.north && lon >= b.west && lon <= b.east;
}
function setStatus(s) { document.getElementById("status").textContent = s; }

// ---------- controls -------------------------------------------------------

let autoTimer = null;
document.getElementById("refresh").addEventListener("click", refresh);
document.getElementById("auto").addEventListener("change", (e) => {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  if (e.target.checked) autoTimer = setInterval(refresh, 10_000);
});
document.getElementById("bbox").addEventListener("change", refresh);
document.getElementById("open-demo").addEventListener("click", () => {
  const url = "index.html" + location.search;
  window.location = url;
});
</script>
</body>
</html>
